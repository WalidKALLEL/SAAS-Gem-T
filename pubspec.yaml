name: biz_pulse_player_portal
description: "Portail Joueur Flutter pour le parcours initial BIZ Pulse."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  
  # --- EXTENSIONS AJOUTÉES POUR BIZ PULSE ---
  flutter_bloc: ^8.1.3       # Le "cerveau" pour séparer la logique de l'affichage
  go_router: ^14.0.0         # Le système de navigation pour passer d'un écran à un autre
  uuid: ^4.3.3               # Pour générer l'identifiant unique de chaque session de jeu

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brand/biz-pulse-logo.png
    - assets/onboarding/
